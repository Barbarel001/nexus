<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEXUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@600;800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --bg:#0a0f1a; --panel:#121a28; --panel-2:#0d1420;
    --line:rgba(148,163,184,.12); --line-2:rgba(148,163,184,.20);
    --txt:#e6edf5; --txt-dim:#94a6bd; --txt-faint:#5f6e82;
    --accent:#38bdf8; --accent-soft:rgba(56,189,248,.12);
    --user-bg:rgba(56,189,248,.10); --user-bd:rgba(56,189,248,.30);
    --danger:#f87171; --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:'Inter',system-ui,'Segoe UI',Roboto,sans-serif;color:var(--txt);
    background:radial-gradient(900px 500px at 60% -160px, rgba(56,189,248,.10), transparent 70%), var(--bg);
    font-size:15px;
  }
  .shell{height:100%;display:flex;position:relative}

  /* ---------- Panel lateral ---------- */
  .sidebar{width:264px;flex:0 0 auto;border-right:1px solid var(--line);
           display:flex;flex-direction:column;padding:18px 14px;gap:12px;background:var(--panel-2);z-index:40}
  .sb-new{display:flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent);
          border:1px solid var(--user-bd);font-family:inherit;font-size:12.5px;font-weight:600;
          padding:8px 12px;border-radius:9px;cursor:pointer;transition:.18s;width:100%;justify-content:center}
  .sb-new:hover{background:rgba(56,189,248,.18)}
  .search{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);
          font-family:inherit;font-size:13px;padding:8px 11px;border-radius:9px;outline:none}
  .search:focus{border-color:var(--line-2)}
  .search::placeholder{color:var(--txt-faint)}
  .sb-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--txt-faint);padding:0 4px}
  .conv-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
  .conv-list::-webkit-scrollbar{width:7px}
  .conv-list::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px}
  .conv{display:flex;align-items:center;gap:8px;padding:10px 11px;border-radius:9px;cursor:pointer;
        color:var(--txt-dim);font-size:13.5px;border:1px solid transparent;transition:.15s}
  .conv:hover{background:rgba(148,163,184,.06);color:var(--txt)}
  .conv.active{background:var(--accent-soft);border-color:var(--user-bd);color:var(--txt)}
  .conv .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conv .del{flex:0 0 auto;width:20px;height:20px;border:none;background:none;color:var(--txt-faint);
             font-size:15px;cursor:pointer;border-radius:5px;opacity:0;transition:.15s;line-height:1}
  .conv:hover .del{opacity:.7}
  .conv .del:hover{opacity:1;color:var(--danger);background:rgba(248,113,113,.12)}
  .sb-empty{color:var(--txt-faint);font-size:12.5px;text-align:center;padding:20px 8px}
  .sb-foot{font-size:10.5px;color:var(--txt-faint);text-align:center;padding-top:4px}

  /* ---------- Panel principal ---------- */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;padding:0 28px}
  .row{width:100%;max-width:760px;margin:0 auto}
  header{display:flex;align-items:center;gap:14px;padding:22px 2px 18px;border-bottom:1px solid var(--line)}
  .brand{display:flex;flex-direction:column;gap:3px;line-height:1}
  .logo{font-family:'Orbitron',sans-serif;font-weight:800;font-size:22px;letter-spacing:5px;color:#f1f7fb}
  .sub{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--txt-faint)}
  .controls{margin-left:auto;display:flex;align-items:center;gap:9px}
  .badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--txt-dim);
         padding:6px 12px;border:1px solid var(--line);border-radius:20px}
  .led{width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 8px #34d399;animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .btn-ic{display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--line);
          color:var(--txt-dim);font-size:14px;min-width:38px;height:34px;padding:0 10px;border-radius:9px;cursor:pointer;transition:.18s}
  .btn-ic:hover{border-color:var(--line-2);color:var(--txt)}
  .btn-ic.on{color:var(--accent);border-color:var(--accent)}
  .hamb{display:none}

  #chat{flex:1;overflow-y:auto;padding:30px 0;display:flex;flex-direction:column;gap:26px}
  #chat::-webkit-scrollbar{width:8px}
  #chat::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px}
  .msg{display:flex;flex-direction:column;max-width:82%;animation:fade .3s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.me{align-self:flex-end;align-items:flex-end}
  .msg.ai{align-self:flex-start;align-items:flex-start}
  .who{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--txt-faint);margin:0 6px 9px}
  .body{padding:15px 18px;border-radius:var(--radius);line-height:1.7;font-size:15px;text-align:left;word-wrap:break-word;overflow-wrap:anywhere}
  .me .body{background:var(--user-bg);border:1px solid var(--user-bd);color:#eaf6ff;border-bottom-right-radius:5px}
  .ai .body{background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
  .ai .body p{margin:0 0 12px} .ai .body p:last-child{margin:0}
  .ai .body ul,.ai .body ol{margin:10px 0;padding-left:22px} .ai .body li{margin:5px 0}
  .ai .body h1,.ai .body h2,.ai .body h3{margin:16px 0 8px;font-weight:600;line-height:1.3}
  .ai .body a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(56,189,248,.3)}
  .ai .body code{font-family:'JetBrains Mono',monospace;background:#0b1320;color:#9bd6ff;padding:2px 6px;border-radius:5px;font-size:13px}
  .ai .body pre{background:#0b1320;border:1px solid var(--line);padding:14px 16px;border-radius:10px;overflow:auto;margin:12px 0}
  .ai .body pre code{background:none;padding:0;color:#cfe9ff}
  .cursor{display:inline-block;width:7px;height:15px;background:var(--accent);margin-left:3px;vertical-align:-2px;border-radius:1px;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .status-line:not(:empty){margin-bottom:10px}
  .tool{display:inline-flex;align-items:center;gap:9px;padding:6px 13px;font-size:12px;color:var(--accent);border:1px solid var(--line-2);border-radius:20px;background:var(--accent-soft)}
  .tool .bars{width:38px;height:6px;border-radius:4px;background:linear-gradient(90deg,var(--accent),transparent);background-size:220% 100%;animation:slide 1.1s linear infinite}
  @keyframes slide{from{background-position:200% 0}to{background-position:-40% 0}}
  .thinking{color:var(--txt-faint);font-size:14px}
  .thinking::after{content:"";animation:dots 1.4s steps(4) infinite}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}
  /* meta (costo) + acciones por mensaje */
  .meta{font-size:11px;color:var(--txt-faint);margin:7px 6px 0;font-family:'JetBrains Mono',monospace}
  .acts{display:flex;gap:8px;margin:7px 4px 0;opacity:0;transition:.15s}
  .msg.ai:hover .acts{opacity:1}
  .act{background:none;border:1px solid var(--line);color:var(--txt-faint);font-family:inherit;font-size:11.5px;
       padding:3px 9px;border-radius:7px;cursor:pointer;transition:.15s}
  .act:hover{color:var(--txt);border-color:var(--line-2)}
  .hist-tools{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 9px}

  form{display:flex;gap:12px;align-items:center;padding:18px 0 24px;border-top:1px solid var(--line)}
  #mic{display:flex;align-items:center;justify-content:center;width:50px;height:50px;flex:0 0 auto;background:var(--panel);border:1px solid var(--line-2);color:var(--accent);font-size:19px;border-radius:12px;cursor:pointer;transition:.18s}
  #mic:hover{border-color:var(--accent);background:rgba(56,189,248,.06)}
  #mic.rec{color:#fff;background:#e11d48;border-color:#e11d48;animation:micpulse 1.1s ease-in-out infinite}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(225,29,72,.5)}50%{box-shadow:0 0 0 8px rgba(225,29,72,0)}}
  #inp{flex:1;height:50px;background:var(--panel);border:1px solid var(--line-2);color:var(--txt);font-family:inherit;font-size:15px;padding:0 18px;border-radius:12px;outline:none;transition:.18s}
  #inp::placeholder{color:var(--txt-faint)}
  #inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  #send{height:50px;flex:0 0 auto;background:var(--accent);border:none;color:#04121d;font-family:inherit;font-weight:600;font-size:14px;padding:0 24px;border-radius:12px;cursor:pointer;transition:.18s;min-width:96px}
  #send:hover{filter:brightness(1.08)}
  #send.stop{background:transparent;color:var(--danger);border:1px solid var(--danger)}

  /* ---------- Overlay + Modales ---------- */
  .overlay{position:fixed;inset:0;background:rgba(2,6,12,.55);z-index:45;display:none}
  .overlay.show{display:block}
  .modal-bg{position:fixed;inset:0;background:rgba(2,6,12,.66);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{width:100%;max-width:460px;background:var(--panel);border:1px solid var(--line-2);border-radius:16px;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .modal-h{font-size:16px;font-weight:600;margin-bottom:6px}
  .modal-sub{font-size:12px;color:var(--txt-dim);margin-bottom:12px}
  .modal-pre{background:#0b1320;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#cfe9ff;white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto;margin:0 0 16px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end}
  .m-btn{font-family:inherit;font-size:13px;font-weight:600;padding:9px 16px;border-radius:9px;cursor:pointer;border:1px solid var(--line-2);background:var(--accent);color:#04121d}
  .m-btn.ghost{background:transparent;color:var(--txt-dim)}
  .m-btn.ghost:hover{color:var(--txt)}
  .m-btn.danger{background:var(--danger);color:#1a0606;border-color:var(--danger)}
  .fld{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;font-size:12.5px;color:var(--txt-dim)}
  .fld.row2{flex-direction:row;align-items:center;gap:9px}
  .fld select,.fld input[type=text]{background:var(--panel-2);border:1px solid var(--line-2);color:var(--txt);
       font-family:inherit;font-size:13.5px;padding:9px 11px;border-radius:9px;outline:none}
  .fld select:focus,.fld input:focus{border-color:var(--accent)}

  /* ---------- Responsive ---------- */
  @media (max-width:820px){
    .main{padding:0 16px}
    .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 0 40px rgba(0,0,0,.4)}
    .sidebar.open{transform:none}
    .hamb{display:flex}
    .logo{font-size:18px;letter-spacing:3px}
    .badge{display:none}
    .msg{max-width:92%}
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="overlay" id="overlay"></div>
    <aside class="sidebar" id="sidebar">
      <button class="sb-new" id="new">＋ Nueva conversación</button>
      <input class="search" id="search" placeholder="🔍 Buscar…" autocomplete="off" />
      <span class="sb-title">Historial</span>
      <div class="conv-list" id="convList"></div>
      <div class="sb-foot" id="sbFoot"></div>
    </aside>

    <div class="main">
      <header class="row">
        <button class="btn-ic hamb" id="hamb" title="Menú">☰</button>
        <div class="brand"><div class="logo">NEXUS</div><div class="sub">Asistente IA</div></div>
        <div class="controls">
          <span class="badge"><span class="led"></span> En línea</span>
          <button class="btn-ic" id="export" title="Exportar conversación a Markdown">⬇</button>
          <button class="btn-ic" id="settings" title="Ajustes">⚙</button>
          <button class="btn-ic" id="tts" title="Leer respuestas en voz alta">🔇</button>
        </div>
      </header>

      <div id="chat" class="row"></div>

      <form id="form" class="row" autocomplete="off">
        <button id="mic" type="button" title="Hablar a Nexus" aria-label="Hablar">🎤</button>
        <input id="inp" placeholder="Escribe un mensaje o pulsa el micrófono…" autofocus />
        <button id="send" type="submit">Enviar</button>
      </form>
    </div>
  </div>

  <!-- Modal: confirmar acción de sistema -->
  <div class="modal-bg" id="confirmBg">
    <div class="modal">
      <div class="modal-h">⚠ Confirmar acción</div>
      <div class="modal-sub" id="confirmName">Nexus quiere ejecutar una acción en tu equipo.</div>
      <pre class="modal-pre" id="confirmBody"></pre>
      <div class="modal-actions">
        <button class="m-btn ghost" id="confirmNo">Denegar</button>
        <button class="m-btn danger" id="confirmYes">Aprobar y ejecutar</button>
      </div>
    </div>
  </div>

  <!-- Modal: ajustes -->
  <div class="modal-bg" id="setBg">
    <div class="modal">
      <div class="modal-h">⚙ Ajustes</div>
      <div class="modal-sub">Se guardan en este navegador.</div>
      <label class="fld"><span>Modelo</span><select id="setModel"></select></label>
      <label class="fld"><span>¿Cómo quieres que Nexus te llame?</span><input type="text" id="setNombre" placeholder="Señor" /></label>
      <label class="fld row2"><input type="checkbox" id="setTts" /><span>Leer las respuestas en voz alta por defecto</span></label>
      <div class="modal-actions">
        <button class="m-btn ghost" id="setCancel">Cerrar</button>
        <button class="m-btn" id="setSave">Guardar</button>
      </div>
    </div>
  </div>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const inp  = document.getElementById('inp');
const send = document.getElementById('send');
const convList = document.getElementById('convList');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

let cid = null, busy = false;
let convsCache = [];                 // para el buscador
let currentES = null, currentFinish = null, pendingRid = null;
let lastUserMsg = '';
let cfg = { acciones:false, modelo:'claude-opus-4-8', modelos:[] };
const ETIQ = {
  'claude-opus-4-8':'Opus 4.8 — más capaz ($5/$25)',
  'claude-sonnet-4-6':'Sonnet 4.6 — equilibrado ($3/$15)',
  'claude-haiku-4-5':'Haiku 4.5 — rápido y barato ($1/$5)',
};

/* ---------- Ajustes (localStorage) ---------- */
const SET = {
  get model(){ return localStorage.getItem('nexus_model') || cfg.modelo; },
  set model(v){ localStorage.setItem('nexus_model', v); },
  get nombre(){ return localStorage.getItem('nexus_nombre') || ''; },
  set nombre(v){ localStorage.setItem('nexus_nombre', v); },
  get tts(){ return localStorage.getItem('nexus_tts') === '1'; },
  set tts(v){ localStorage.setItem('nexus_tts', v ? '1' : '0'); },
};

function scrollEnd(){ chat.scrollTop = chat.scrollHeight; }

/* ---------- Sidebar móvil ---------- */
function toggleSidebar(open){
  const o = (open === undefined) ? !sidebar.classList.contains('open') : open;
  sidebar.classList.toggle('open', o); overlay.classList.toggle('show', o);
}
document.getElementById('hamb').addEventListener('click', () => toggleSidebar());
overlay.addEventListener('click', () => toggleSidebar(false));

/* ---------- Lista de conversaciones ---------- */
function renderLista(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const convs = q ? convsCache.filter(c => (c.titulo||'').toLowerCase().includes(q)) : convsCache;
  convList.innerHTML = '';
  if(!convsCache.length){ convList.innerHTML = '<div class="sb-empty">Sin conversaciones todavía.</div>'; return; }
  if(!convs.length){ convList.innerHTML = '<div class="sb-empty">Sin coincidencias.</div>'; return; }
  for(const c of convs){
    const it = document.createElement('div');
    it.className = 'conv' + (c.id === cid ? ' active' : '');
    it.title = 'Doble clic para renombrar';
    it.innerHTML = '<span class="t"></span><button class="del" title="Borrar">×</button>';
    it.querySelector('.t').textContent = c.titulo || 'Conversación';
    it.addEventListener('click', e => { if(!e.target.classList.contains('del')){ abrirConv(c.id); toggleSidebar(false); } });
    it.addEventListener('dblclick', () => renombrarConv(c.id, c.titulo));
    it.querySelector('.del').addEventListener('click', e => { e.stopPropagation(); borrarConv(c.id); });
    convList.appendChild(it);
  }
}
async function cargarLista(){
  const r = await fetch('/api/conversaciones');
  convsCache = await r.json();
  document.getElementById('sbFoot').textContent = convsCache.length ? (convsCache.length + ' conversaciones') : '';
  renderLista();
}
document.getElementById('search').addEventListener('input', renderLista);

async function renombrarConv(id, actual){
  const nuevo = prompt('Nuevo nombre de la conversación:', actual || '');
  if(nuevo === null) return;
  const t = nuevo.trim(); if(!t) return;
  await fetch('/api/conversacion/' + id + '/renombrar', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({titulo:t})
  });
  await cargarLista();
}

/* ---------- Pintado de mensajes ---------- */
function adornarAI(node, getText, conRegenerar){
  const acts = document.createElement('div'); acts.className = 'acts';
  const cp = document.createElement('button'); cp.className = 'act'; cp.textContent = '⧉ Copiar';
  cp.addEventListener('click', () => {
    navigator.clipboard.writeText(getText() || '').then(() => {
      cp.textContent = '✓ Copiado'; setTimeout(() => cp.textContent = '⧉ Copiar', 1200);
    });
  });
  acts.appendChild(cp);
  if(conRegenerar){
    const rg = document.createElement('button'); rg.className = 'act'; rg.textContent = '↻ Regenerar';
    rg.addEventListener('click', regenerar); acts.appendChild(rg);
  }
  node.appendChild(acts);
}

function pinta(role, text, ultimo, tools){
  const m = document.createElement('div'); m.className = 'msg ' + (role === 'user' ? 'me' : 'ai');
  m.innerHTML = '<div class="who">' + (role === 'user' ? 'Tú' : 'Nexus') + '</div><div class="body"></div>';
  const body = m.querySelector('.body');
  if(role === 'user') body.textContent = text;
  else { try{ body.innerHTML = marked.parse(text); }catch(_){ body.textContent = text; } }
  if(role !== 'user' && tools && tools.length){
    const ht = document.createElement('div'); ht.className = 'hist-tools';
    tools.forEach(t => { const s = document.createElement('span'); s.className = 'tool'; s.textContent = '⚙ ' + t; ht.appendChild(s); });
    m.insertBefore(ht, body);
  }
  chat.appendChild(m);
  if(role !== 'user') adornarAI(m, () => text, !!ultimo);
  return m;
}

async function abrirConv(id){
  if(busy) return;
  const r = await fetch('/api/conversacion/' + id);
  if(!r.ok) return;
  const c = await r.json();
  cid = id; chat.innerHTML = ''; lastUserMsg = '';
  const turnos = c.turnos || [];
  turnos.forEach((t, i) => {
    if(t.role === 'user') lastUserMsg = t.text;
    pinta(t.role, t.text, t.role === 'assistant' && i === turnos.length - 1, t.tools);
  });
  renderLista(); scrollEnd(); inp.focus();
}

async function nuevaConv(){
  const r = await fetch('/api/nueva', {method:'POST'});
  cid = (await r.json()).id;
  chat.innerHTML = ''; lastUserMsg = '';
  await cargarLista(); inp.focus();
}

async function borrarConv(id){
  await fetch('/api/conversacion/' + id + '/borrar', {method:'POST'});
  if(id === cid){ await nuevaConv(); } else { await cargarLista(); }
}

/* ---------- Envío + streaming ---------- */
function addNexus(){
  const m = document.createElement('div'); m.className = 'msg ai';
  m.innerHTML = '<div class="who">Nexus</div><div class="status-line"></div><div class="body"><span class="thinking">procesando</span></div>';
  chat.appendChild(m); scrollEnd(); return m;
}
function setBusy(v){
  busy = v; send.textContent = v ? 'Detener' : 'Enviar'; send.classList.toggle('stop', v);
}

function sendMessage(text, porVoz, opts){
  opts = opts || {};
  if(busy || !text.trim() || !cid) return;
  stopSpeak();
  const hablar = porVoz || SET.tts;
  lastUserMsg = text;
  setBusy(true);
  if(!opts.skipEcho) pinta('user', text);
  const node = addNexus(); const body = node.querySelector('.body');
  let raw = '', started = false, usage = null;

  let url = '/api/stream?cid=' + cid + '&msg=' + encodeURIComponent(text)
          + '&model=' + encodeURIComponent(SET.model);
  if(SET.nombre) url += '&nombre=' + encodeURIComponent(SET.nombre);
  if(opts.regen) url += '&regen=1';

  const es = new EventSource(url); currentES = es;

  es.addEventListener('delta', e => {
    if(!started){ started = true; body.innerHTML = ''; }
    raw += JSON.parse(e.data).text; body.textContent = raw;
    const c = document.createElement('span'); c.className = 'cursor'; body.appendChild(c);
    scrollEnd();
  });
  es.addEventListener('tool', e => {
    node.querySelector('.status-line').innerHTML =
      '<span class="tool"><span class="bars"></span> usando ' + JSON.parse(e.data).name + '</span>';
    if(!started){ body.innerHTML = '<span class="thinking">procesando</span>'; }
    scrollEnd();
  });
  es.addEventListener('confirm', e => { pedirConfirmacion(JSON.parse(e.data)); });
  es.addEventListener('usage', e => { try{ usage = JSON.parse(e.data); }catch(_){ } });
  es.addEventListener('error', e => { try{ body.textContent = '⚠ ' + JSON.parse(e.data).msg; }catch(_){ } });

  const finish = (ev, detenido) => {
    es.close(); currentES = null; currentFinish = null;
    node.querySelector('.status-line').innerHTML = '';
    if(raw){ try{ body.innerHTML = marked.parse(raw); }catch(_){ body.textContent = raw; } }
    else if(!started){ body.textContent = detenido ? '(detenido)' : '(sin respuesta)'; }
    if(usage){ pintaCosto(node, usage); }
    adornarAI(node, () => raw, true);
    if(hablar && !detenido && body.textContent){ speak(body.textContent); }
    try{ if(ev && ev.data && JSON.parse(ev.data).nueva) cargarLista(); else cargarLista(); }catch(_){ cargarLista(); }
    setBusy(false); inp.focus(); scrollEnd();
  };
  currentFinish = finish;
  es.addEventListener('done', finish);
  es.onerror = () => { if(busy) finish(null, false); };
}

function pintaCosto(node, u){
  const tot = (u.in||0) + (u.out||0);
  const corto = (u.modelo||'').split('-')[1] || '';
  const cst = (u.costo < 0.001) ? '<$0.001' : ('~$' + Number(u.costo).toFixed(u.costo < 0.01 ? 5 : 4));
  const d = document.createElement('div'); d.className = 'meta';
  d.textContent = (corto ? corto + ' · ' : '') + tot.toLocaleString() + ' tok · ' + cst;
  node.appendChild(d);
}

function regenerar(){
  if(busy || !lastUserMsg) return;
  const ais = chat.querySelectorAll('.msg.ai');
  if(ais.length) ais[ais.length - 1].remove();
  sendMessage(lastUserMsg, false, {skipEcho:true, regen:true});
}

function detener(){
  if(pendingRid){ responder(false); }
  if(currentFinish) currentFinish(null, true);
  else { setBusy(false); }
}

form.addEventListener('submit', e => {
  e.preventDefault();
  if(busy){ detener(); return; }
  const t = inp.value; inp.value = ''; sendMessage(t, false);
});
document.getElementById('new').addEventListener('click', () => { if(!busy){ nuevaConv(); toggleSidebar(false); } });

/* ---------- Modal de confirmación ---------- */
const confirmBg = document.getElementById('confirmBg');
function pedirConfirmacion(d){
  pendingRid = d.rid;
  document.getElementById('confirmName').textContent =
    (d.name === 'run_command') ? 'Nexus quiere EJECUTAR un comando en tu equipo:' : 'Nexus quiere ESCRIBIR un archivo:';
  document.getElementById('confirmBody').textContent = d.resumen || '';
  confirmBg.classList.add('show');
}
function responder(ok){
  const rid = pendingRid; pendingRid = null; confirmBg.classList.remove('show');
  if(!rid) return;
  fetch('/api/confirm', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({rid:rid, ok:ok})});
}
document.getElementById('confirmYes').addEventListener('click', () => responder(true));
document.getElementById('confirmNo').addEventListener('click', () => responder(false));

/* ---------- Exportar a Markdown ---------- */
document.getElementById('export').addEventListener('click', async () => {
  if(!cid) return;
  let titulo = 'nexus', turnos = [];
  try{
    const r = await fetch('/api/conversacion/' + cid);
    if(r.ok){ const c = await r.json(); titulo = c.titulo || 'nexus'; turnos = c.turnos || []; }
  }catch(_){ }
  if(!turnos.length){ alert('Esta conversación todavía no tiene mensajes guardados.'); return; }
  let md = '# ' + titulo + '\n\n';
  for(const t of turnos){ md += (t.role === 'user' ? '**Tú:** ' : '**Nexus:** ') + t.text + '\n\n'; }
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = titulo.replace(/[^\w\-]+/g,'_').slice(0,40) + '.md';
  a.click(); URL.revokeObjectURL(a.href);
});

/* ---------- Ajustes ---------- */
const setBg = document.getElementById('setBg');
document.getElementById('settings').addEventListener('click', () => {
  const sel = document.getElementById('setModel'); sel.innerHTML = '';
  (cfg.modelos.length ? cfg.modelos : [cfg.modelo]).forEach(mid => {
    const o = document.createElement('option'); o.value = mid; o.textContent = ETIQ[mid] || mid; sel.appendChild(o);
  });
  sel.value = SET.model;
  document.getElementById('setNombre').value = SET.nombre;
  document.getElementById('setTts').checked = SET.tts;
  setBg.classList.add('show');
});
document.getElementById('setCancel').addEventListener('click', () => setBg.classList.remove('show'));
document.getElementById('setSave').addEventListener('click', () => {
  SET.model = document.getElementById('setModel').value;
  SET.nombre = document.getElementById('setNombre').value.trim();
  SET.tts = document.getElementById('setTts').checked;
  aplicarTts(SET.tts);
  setBg.classList.remove('show');
});

/* ---------- VOZ: hablar (TTS) y escuchar (STT) ---------- */
let ttsOn = false, voz = null;
function elegirVoz(){ const vs = window.speechSynthesis ? speechSynthesis.getVoices() : []; voz = vs.find(v => /^es/i.test(v.lang)) || null; }
if('speechSynthesis' in window){ elegirVoz(); speechSynthesis.onvoiceschanged = elegirVoz; }
function speak(txt){
  if(!('speechSynthesis' in window) || !txt) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt.slice(0, 4000));
  u.lang = 'es-ES'; if(voz) u.voice = voz; u.rate = 1.05; speechSynthesis.speak(u);
}
function stopSpeak(){ if('speechSynthesis' in window) speechSynthesis.cancel(); }

const ttsBtn = document.getElementById('tts');
function aplicarTts(on){ ttsOn = on; SET.tts = on; ttsBtn.textContent = on ? '🔊' : '🔇'; ttsBtn.classList.toggle('on', on); if(!on) stopSpeak(); }
ttsBtn.addEventListener('click', () => aplicarTts(!ttsOn));

const micBtn = document.getElementById('mic');
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, escuchando = false;
if(SR){
  rec = new SR(); rec.lang = 'es-ES'; rec.interimResults = false; rec.maxAlternatives = 1;
  rec.onresult = e => { sendMessage(e.results[0][0].transcript, true); };
  rec.onend   = () => { escuchando = false; micBtn.classList.remove('rec'); };
  rec.onerror = () => { escuchando = false; micBtn.classList.remove('rec'); };
  micBtn.addEventListener('click', () => {
    if(escuchando){ rec.stop(); return; }
    stopSpeak();
    try{ rec.start(); escuchando = true; micBtn.classList.add('rec'); }catch(_){ }
  });
} else { micBtn.title = 'Tu navegador no soporta dictado por voz (usa Chrome o Edge)'; micBtn.style.opacity = .4; }

/* ---------- Inicio ---------- */
(async function init(){
  try{ const rc = await fetch('/api/config'); if(rc.ok) cfg = await rc.json(); }catch(_){ }
  aplicarTts(SET.tts);
  const r = await fetch('/api/conversaciones');
  convsCache = await r.json();
  if(convsCache.length){ await abrirConv(convsCache[0].id); }
  else { await nuevaConv(); }
  await cargarLista();
})();
</script>

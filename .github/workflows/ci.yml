name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      # Linter: errores reales (pyflakes), estilo básico e imports ordenados.
      - name: Ruff
        run: ruff check .

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      # Escaneo de vulnerabilidades conocidas en las dependencias (CVE/PyPI advisories).
      # No bloquea el merge (continue-on-error) para no frenar por avisos de terceros;
      # revisa el resumen en la pestaña Actions.
      - name: Audit dependencies
        continue-on-error: true
        run: pip-audit -r requirements.txt --desc
